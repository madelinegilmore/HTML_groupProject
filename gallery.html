
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Endangered Animal Conservation</title>
    <!-- Link to Global CSS -->
    <link rel="stylesheet" href="styles.css">

    <style>
        .scroll-container {
            overflow-x: auto;
            white-space: nowrap; /* Prevents images from wrapping to the next line */
            padding: 10px;
        }

        .image-card {
            display: inline-block;
            position: relative;
            overflow: hidden;
            margin-right: 10px;
        }

        .image-card img {
            width: 800px;
            height: 500px;
            object-fit: cover;
            display: block;
        }

        /* Overlay (hidden by default) */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(106, 160, 159, 0.9);
            color: white;

            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;

            opacity: 0;
            transition: opacity 0.3s;
            padding: 10px;
        }
    </style>
</head>
<body>

    <!--  HEADER  -->
    <!-- DO NOT CHANGE: Logo and navigation structure -->
    <header>
        <!-- Logo -->
        <img src="conservation_logo_white.png" alt="Endangered Animals Logo" width="100">

    <!-- MAIN CONTENT  -->
    <!-- Each team member adds content here -->
    <main>
        <div class="scroll-container">

            <div class="image-card" data-desc="Beautiful coastal village in Italy">
              <img src="https://media.cntraveller.com/photos/611befdcdb797d0116fd4d86/16:9/w_3200,h_1800,c_limit/end.jpg" alt="Cinque Terre">
            </div>
          
            <div class="image-card" data-desc="Lush green forest ecosystem">
              <img src="https://www.green.earth/hubfs/Why%20should%20endangered%20species%20be%20protected%20_featured.png" alt="Forest">
            </div>

            <script>
                document.addEventListener("DOMContentLoaded", () => {
                    const cards = document.querySelectorAll(".image-card");

                    cards.forEach((card) => {
                        const overlay = document.createElement("div");
                        overlay.classList.add("overlay");
                        overlay.textContent = card.getAttribute("data-desc") || "";

                        card.appendChild(overlay);

                        card.addEventListener("mouseenter", () => {
                            overlay.style.opacity = "1";
                        });

                        card.addEventListener("mouseleave", () => {
                            overlay.style.opacity = "0";
                        });
                    });
                });
            </script>

              <img src="img_mountains.jpg" alt="Mountains">

          </div>
          
          <script src="script.js"></script>
    </main>
